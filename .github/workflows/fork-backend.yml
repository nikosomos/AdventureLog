name: Build forked images and push to GHCR

permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - 'fork-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. v0.12.1-cat-share-filters)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: backend
            image: adventurelog-backend
            context: ./backend
          - name: frontend
            image: adventurelog-frontend
            context: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#fork-}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.component.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.component.image }}:${{ steps.tag.outputs.value }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.component.image }}:buildcache
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.component.image }}:buildcache,mode=max
